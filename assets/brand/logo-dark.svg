<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" fill="none" role="img" aria-label="Drawify" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="g-brand" gradientUnits="objectBoundingBox" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="g-text" gradientUnits="objectBoundingBox" x1="0" y1="1" x2="1" y2="0">
