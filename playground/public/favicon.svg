<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="Drawify" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="g-brand" gradientUnits="objectBoundingBox" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="g-shine" gradientUnits="objectBoundingBox" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="ambient" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="b"/>
      <feComponentTransfer in="b" result="dim">
        <feFuncA type="linear" slope="0.22"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Soft ambient layer (blurred duplicate, stays behind) -->
  <g filter="url(#ambient)" opacity="0.9">
    <rect x="8" y="8" width="32" height="32" rx="7" fill="none" stroke="url(#g-brand)" stroke-width="2"/>
    <path fill="url(#g-brand)" d="
      M 17, 16
      H 24
      A 8, 8, 0 0 1 32, 24
      V 24
      A 8, 8, 0 0 1 24, 32
      H 17
      A 1, 1, 0 0 1 16, 31
      V 17
      A 1, 1, 0 0 1 17, 16
      Z
    "/>
  </g>

  <!-- Crisp flat foreground -->
  <rect x="8" y="8" width="32" height="32" rx="7" fill="none" stroke="url(#g-brand)" stroke-width="2"/>
  <path fill="url(#g-brand)" d="
    M 17, 16
    H 24
    A 8, 8, 0 0 1 32, 24
    V 24
    A 8, 8, 0 0 1 24, 32
    H 17
    A 1, 1, 0 0 1 16, 31
    V 17
    A 1, 1, 0 0 1 17, 16
    Z
  "/>
  <path fill="url(#g-shine)" d="
    M 17, 16
    H 24
    A 8, 8, 0 0 1 32, 24
    V 24
    A 8, 8, 0 0 1 24, 32
    H 17
    A 1, 1, 0 0 1 16, 31
    V 17
    A 1, 1, 0 0 1 17, 16
    Z
  "/>
</svg>
