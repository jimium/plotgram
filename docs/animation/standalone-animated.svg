<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <style><![CDATA[
      @keyframes pop-in {
        0%   { opacity: 0; transform: scale(0); }
        60%  { transform: scale(1.15); }
        100% { opacity: 1; transform: scale(1); }
      }
      @keyframes flow {
        to { stroke-dashoffset: -20; }
      }
      @keyframes draw {
        from { stroke-dashoffset: 200; }
        to   { stroke-dashoffset: 0; }
      }
      @keyframes pulse-glow {
        0%, 100% { filter: drop-shadow(0 0 3px #4caf50); }
        50%      { filter: drop-shadow(0 0 10px #4caf50); }
      }
      .node {
        opacity: 0;
        animation: pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
        transform-box: fill-box;
        transform-origin: center;
      }
      .node-a { animation-delay: 0s; }
      .node-b { animation-delay: 0.3s; }
      .node-c { animation-delay: 0.6s; }
      .edge {
        stroke-dasharray: 200;
        stroke-dashoffset: 200;
        animation: draw 0.5s ease-out forwards;
      }
      .edge-ab { animation-delay: 0.15s; }
      .edge-bc { animation-delay: 0.45s; }
      .edge-flow {
        stroke-dasharray: 6 4;
        animation: flow 0.7s linear infinite, draw 0.5s ease-out 0.75s forwards;
        stroke: #ff6b35;
      }
      .active-node {
        animation: pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.9s forwards,
                   pulse-glow 2s ease-in-out 1.4s infinite;
        opacity: 0;
      }
      .label {
        font-family: -apple-system, sans-serif;
        font-size: 14px;
        fill: white;
        text-anchor: middle;
        pointer-events: none;
      }
      .title {
        font-family: -apple-system, sans-serif;
        font-size: 11px;
        fill: #888;
        text-anchor: middle;
      }
    ]]></style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#667eea"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#ff6b35"/>
    </marker>
  </defs>

  <rect width="400" height="200" fill="#0f0f23" rx="8"/>
  <text x="200" y="22" class="title">CSS 动画全部内嵌于此 SVG 文件内部</text>

  <path class="edge edge-ab" d="M105 100 L155 100" stroke="#667eea" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path class="edge edge-bc" d="M245 100 L295 100" stroke="#667eea" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path class="edge-flow" d="M105 125 L295 125" stroke-width="2.5" fill="none" marker-end="url(#arrow-orange)"/>

  <g class="node node-a">
    <rect x="60" y="80" width="50" height="40" rx="8" fill="#4a6fa5" stroke="#667eea" stroke-width="2"/>
    <text x="85" y="105" class="label">A</text>
  </g>
  <g class="node node-b">
    <rect x="155" y="80" width="90" height="40" rx="8" fill="#2e7d32" stroke="#4caf50" stroke-width="3"/>
    <text x="200" y="105" class="label">API</text>
  </g>
  <g class="active-node">
    <rect x="295" y="80" width="50" height="40" rx="8" fill="#4a6fa5" stroke="#667eea" stroke-width="2"/>
    <text x="320" y="105" class="label">C</text>
  </g>

  <text x="200" y="165" class="title" style="font-size:10px;fill:#666;">入场弹性缩放 · 边绘制 · 数据流动 · 脉冲高亮</text>
</svg>
